<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0C0406;
      font-family: 'Playfair Display', Georgia, serif;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* Scene 1 visible by default; 2, 3 start hidden */
    #scene1 { z-index: 1; background: #0C0406; }
    #scene2 { z-index: 2; background: #1C0A02; opacity: 0; }
    #scene3 { z-index: 3; background: #0B0305; opacity: 0; }

    #fade-overlay {
      position: absolute;
      inset: 0;
      background: #060204;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div
    id="root"
    data-composition-id="relish-hero"
    data-width="375"
    data-height="812"
    data-start="0"
    data-duration="7.5"
  >

    <!-- ═══════════════════════════════════════════════════════════════════
         SCENE 1 — CANDLELIGHT
         Dark field, amber + maroon bokeh, ghost R, atmospheric texture.
         Content fills the full frame.
    ═══════════════════════════════════════════════════════════════════ -->
    <div id="scene1" class="scene">

      <!-- Oversized ghost "R" -->
      <div id="s1-ghost-r" style="
        position: absolute; top: 50%; left: 50%;
        transform: translate(-52%, -50%);
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 420px; font-weight: 700;
        color: rgba(245,158,45,0.055);
        line-height: 1; user-select: none; pointer-events: none;
        opacity: 0;
      ">R</div>

      <!-- Amber primary bokeh — upper left quadrant -->
      <div id="s1-bokeh-a" style="
        position: absolute;
        width: 340px; height: 340px; border-radius: 50%;
        background: radial-gradient(circle, rgba(245,155,45,0.68) 0%, rgba(195,88,14,0.28) 44%, transparent 70%);
        top: -100px; left: -60px;
        filter: blur(32px); opacity: 0;
      "></div>

      <!-- Maroon bokeh — lower right -->
      <div id="s1-bokeh-b" style="
        position: absolute;
        width: 260px; height: 260px; border-radius: 50%;
        background: radial-gradient(circle, rgba(139,16,36,0.55) 0%, rgba(72,6,16,0.22) 46%, transparent 70%);
        bottom: -80px; right: -20px;
        filter: blur(24px); opacity: 0;
      "></div>

      <!-- Third bokeh — mid frame atmosphere -->
      <div id="s1-bokeh-c" style="
        position: absolute;
        width: 200px; height: 200px; border-radius: 50%;
        background: radial-gradient(circle, rgba(185,110,25,0.28) 0%, transparent 65%);
        top: 40%; left: 55%;
        filter: blur(28px); opacity: 0;
      "></div>

      <!-- Horizontal atmosphere band -->
      <div id="s1-band" style="
        position: absolute; top: 50%; left: 0;
        width: 100%; height: 1px;
        background: linear-gradient(to right, transparent 0%, rgba(245,155,45,0.13) 50%, transparent 100%);
        margin-top: -0.5px; opacity: 0;
      "></div>

      <!-- Gold hairline rule -->
      <svg id="s1-rule" style="position:absolute; top:50%; left:0; margin-top:-1px; opacity:0;" width="100%" height="1" viewBox="0 0 375 1" preserveAspectRatio="none">
        <line x1="0" y1="0.5" x2="375" y2="0.5" stroke="rgba(217,160,58,0.20)" stroke-width="0.7"/>
      </svg>

      <!-- 6 dust particles (scattered across full frame) -->
      <div id="s1-p1" style="position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(245,175,75,0.72);top:35%;left:28%;opacity:0;"></div>
      <div id="s1-p2" style="position:absolute;width:1.5px;height:1.5px;border-radius:50%;background:rgba(245,175,75,0.52);top:52%;left:54%;opacity:0;"></div>
      <div id="s1-p3" style="position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(220,135,48,0.62);top:22%;left:64%;opacity:0;"></div>
      <div id="s1-p4" style="position:absolute;width:1px;height:1px;border-radius:50%;background:rgba(255,195,95,0.82);top:68%;left:18%;opacity:0;"></div>
      <div id="s1-p5" style="position:absolute;width:1.5px;height:1.5px;border-radius:50%;background:rgba(245,175,75,0.58);top:42%;left:80%;opacity:0;"></div>
      <div id="s1-p6" style="position:absolute;width:1px;height:1px;border-radius:50%;background:rgba(218,155,58,0.62);top:78%;left:44%;opacity:0;"></div>

      <!-- Top "Est. 2018" caption -->
      <div id="s1-top-cap" style="
        position: absolute; top: 5%; left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 7px; letter-spacing: 0.36em;
        text-transform: uppercase;
        color: rgba(217,140,40,0.40); white-space: nowrap; opacity: 0;
      ">Est. 2018</div>

      <!-- Bottom micro-label -->
      <div id="s1-label" style="
        position: absolute; bottom: 7%; left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 7px; letter-spacing: 0.30em;
        text-transform: uppercase;
        color: rgba(240,195,98,0.48); white-space: nowrap; opacity: 0;
      ">Relish · International Veg Cuisine</div>

      <!-- 4 corner L-marks -->
      <svg id="s1-c-tl" style="position:absolute;top:3%;left:3%;opacity:0;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M0 16L0 0L16 0" stroke="rgba(217,160,58,0.45)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg id="s1-c-tr" style="position:absolute;top:3%;right:3%;opacity:0;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M16 16L16 0L0 0" stroke="rgba(217,160,58,0.45)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg id="s1-c-bl" style="position:absolute;bottom:3%;left:3%;opacity:0;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M0 0L0 16L16 16" stroke="rgba(217,160,58,0.45)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg id="s1-c-br" style="position:absolute;bottom:3%;right:3%;opacity:0;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M16 0L16 16L0 16" stroke="rgba(217,160,58,0.45)" stroke-width="0.9" fill="none"/>
      </svg>

    </div><!-- /scene1 -->


    <!-- ═══════════════════════════════════════════════════════════════════
         SCENE 2 — THE PLATE
         Full-frame warm ember scene. Plate positioned in the upper-center
         area (top 30%). Caption strip at very bottom.
    ═══════════════════════════════════════════════════════════════════ -->
    <div id="scene2" class="scene">

      <!-- BG gradient — warm embers, full frame -->
      <div style="position:absolute;inset:0;background:linear-gradient(148deg,#1C0A02 0%,#3C1804 30%,#6A3010 58%,#9A5020 82%,#B07030 100%);"></div>

      <!-- Bokeh overlays — full frame spread -->
      <div id="s2-bokeh-a" style="
        position: absolute;
        width: 300px; height: 260px; border-radius: 50%;
        background: radial-gradient(circle, rgba(245,178,55,0.40) 0%, transparent 65%);
        top: -40px; left: 50%; margin-left: -80px;
        filter: blur(30px); opacity: 0;
      "></div>
      <div id="s2-bokeh-b" style="
        position: absolute;
        width: 220px; height: 220px; border-radius: 50%;
        background: radial-gradient(circle, rgba(175,75,18,0.36) 0%, transparent 65%);
        bottom: -30px; right: -30px;
        filter: blur(24px); opacity: 0;
      "></div>
      <div id="s2-bokeh-c" style="
        position: absolute;
        width: 180px; height: 180px; border-radius: 50%;
        background: radial-gradient(circle, rgba(230,165,45,0.30) 0%, transparent 65%);
        bottom: 20%; left: -20px;
        filter: blur(20px); opacity: 0;
      "></div>

      <!-- Plate — centered horizontally, 28% from top -->
      <!-- Plate SVG: 180×180. Centered: left = 50% - 90 = 97.5px. top = 28% of 812 = 227px -->
      <svg id="s2-plate"
           style="position:absolute; left:97px; top:204px; opacity:0;"
           width="180" height="180" viewBox="0 0 180 180">
        <ellipse cx="90" cy="170" rx="65" ry="7" fill="rgba(0,0,0,0.28)"/>
        <circle cx="90" cy="90" r="75" fill="#EDE5CE" stroke="#D9A03A" stroke-width="2.6"/>
        <circle cx="90" cy="90" r="62" fill="#FFFDF8"/>
        <circle cx="90" cy="90" r="52" fill="none" stroke="rgba(217,160,58,0.10)" stroke-width="0.6"/>
        <!-- Sauce stroke -->
        <path id="s2-sauce"
              d="M42 88 Q64 74 90 88 Q116 102 138 84"
              stroke="#B84C0A" stroke-width="14" stroke-linecap="round" fill="none"
              opacity="0.85"
              stroke-dasharray="138" stroke-dashoffset="138"/>
        <!-- Protein stack -->
        <g id="s2-protein" opacity="0">
          <rect x="70" y="67" width="40" height="25" rx="6" fill="#8A3818"/>
          <rect x="73" y="62" width="34" height="10" rx="5" fill="#B55C28"/>
          <rect x="77" y="57" width="26" height="7" rx="4" fill="#CA7040"/>
        </g>
        <!-- Herb garnish -->
        <g id="s2-herb" opacity="0">
          <path d="M92 57 Q87 48 80 53 Q87 57 87 65" fill="#4A7A28"/>
          <path d="M95 55 Q102 47 108 53 Q100 56 97 63" fill="#4A7A28"/>
          <line x1="90" y1="61" x2="90" y2="53" stroke="#5A9A38" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <!-- Micro greens -->
        <g id="s2-greens" opacity="0">
          <path d="M113 103 Q110 96 115 93" stroke="#6A9A46" stroke-width="1.4" fill="none"/>
          <path d="M117 106 Q114 99 119 96" stroke="#6A9A46" stroke-width="1.4" fill="none"/>
          <path d="M121 103 Q118 96 123 94" stroke="#6A9A46" stroke-width="1.4" fill="none"/>
        </g>
        <!-- Gold + maroon sauce dots -->
        <circle id="s2-d1" cx="54"  cy="110" r="3.5" fill="#D9A03A" opacity="0"/>
        <circle id="s2-d2" cx="62"  cy="120" r="2.8" fill="#D9A03A" opacity="0"/>
        <circle id="s2-d3" cx="46"  cy="118" r="2.2" fill="#D9A03A" opacity="0"/>
        <circle id="s2-d4" cx="132" cy="65"  r="3.2" fill="#8B1024" opacity="0"/>
        <circle id="s2-d5" cx="140" cy="74"  r="2.4" fill="#8B1024" opacity="0"/>
        <circle id="s2-d6" cx="142" cy="62"  r="1.8" fill="#8B1024" opacity="0"/>
      </svg>

      <!-- Steam wisps — above plate center -->
      <svg id="s2-steam" style="position:absolute; left:166px; top:162px; opacity:0;"
           width="70" height="50" viewBox="0 0 70 50">
        <path d="M12 50 Q10 36 14 24 Q18 12 16 0" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M35 50 Q32 34 36 22 Q40 10 38 0"  stroke="rgba(255,255,255,0.17)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M58 50 Q56 38 60 26 Q64 14 62 0"  stroke="rgba(255,255,255,0.20)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Caption strip at very bottom -->
      <div id="s2-caption" style="
        position:absolute; bottom:0; left:0; right:0; padding:10px 18px;
        background: linear-gradient(to top, rgba(14,4,1,0.92) 0%, transparent 100%);
        display:flex; align-items:center; justify-content:space-between;
        opacity:0;
      ">
        <span style="font-family:'Inter',sans-serif;font-size:7.5px;letter-spacing:0.24em;text-transform:uppercase;color:rgba(240,195,98,0.78);">Signature Collection</span>
        <span style="color:rgba(217,160,58,0.72);font-size:9px;letter-spacing:0.24em;">✦ ✦ ✦</span>
        <span style="font-family:'Inter',sans-serif;font-size:7.5px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(240,195,98,0.52);">Season 2025</span>
      </div>

      <!-- Scan lines texture -->
      <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.013) 2px,rgba(0,0,0,0.013) 4px);"></div>

    </div><!-- /scene2 -->


    <!-- ═══════════════════════════════════════════════════════════════════
         SCENE 3 — RELISH REVEAL + AMBIENT INGREDIENTS
         Dark velvet full-frame. RELISH tumbles in at 28% from top.
         After reveal, 8 ingredient silhouettes float through the space.
    ═══════════════════════════════════════════════════════════════════ -->
    <div id="scene3" class="scene">

      <!-- Underlight bloom from below — full width -->
      <div id="s3-underlight" style="
        position: absolute;
        width: 120%; height: 200px; border-radius: 50%;
        background: radial-gradient(ellipse, rgba(215,120,35,0.48) 0%, rgba(170,76,16,0.20) 45%, transparent 68%);
        bottom: -80px; left: -10%;
        filter: blur(28px); opacity: 0;
      "></div>

      <!-- Top gold rule -->
      <svg id="s3-top-rule" style="position:absolute;top:5%;left:5%;opacity:0;" width="90%" height="1" viewBox="0 0 335 1">
        <line id="s3-tr-line" x1="0" y1="0.5" x2="335" y2="0.5"
              stroke="rgba(217,160,58,0.46)" stroke-width="0.8"
              stroke-dasharray="335" stroke-dashoffset="335"/>
      </svg>

      <!-- RELISH letters — centered, 28% from top -->
      <div id="s3-letters" style="
        position: absolute;
        top: 28%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        perspective: 500px;
        gap: 2px;
        white-space: nowrap;
      ">
        <span id="s3-l0" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">R</span>
        <span id="s3-l1" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">E</span>
        <span id="s3-l2" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">L</span>
        <span id="s3-l3" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">I</span>
        <span id="s3-l4" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">S</span>
        <span id="s3-l5" style="font-family:'Playfair Display',Georgia,serif;font-size:58px;font-weight:700;color:#FFF8EA;line-height:1;display:inline-block;opacity:0;">H</span>
      </div>

      <!-- Gold underline — below RELISH (28% + ~36px) -->
      <svg id="s3-underline" style="position:absolute;top:calc(28% + 24px);left:50%;margin-left:-120px;opacity:0;"
           width="240" height="4" viewBox="0 0 240 4">
        <line id="s3-ul-line" x1="0" y1="2" x2="240" y2="2"
              stroke="#D9A03A" stroke-width="1.6" stroke-linecap="round"
              stroke-dasharray="240" stroke-dashoffset="240"/>
      </svg>

      <!-- Subtitle -->
      <div id="s3-subtitle" style="
        position: absolute;
        top: calc(28% + 44px); left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 8px; letter-spacing: 0.38em;
        text-transform: uppercase;
        color: rgba(240,193,96,0.66);
        white-space: nowrap; opacity: 0;
      ">International Veg Cuisine</div>

      <!-- Ornaments flanking subtitle -->
      <div id="s3-orn-l" style="position:absolute;top:calc(28% + 44px);left:6%;font-size:9px;color:rgba(217,160,58,0.45);opacity:0;">✦</div>
      <div id="s3-orn-r" style="position:absolute;top:calc(28% + 44px);right:6%;font-size:9px;color:rgba(217,160,58,0.45);opacity:0;">✦</div>

      <!-- Bottom rule -->
      <svg id="s3-bot-rule" style="position:absolute;bottom:5%;left:5%;opacity:0;" width="90%" height="1" viewBox="0 0 335 1">
        <line id="s3-br-line" x1="0" y1="0.5" x2="335" y2="0.5"
              stroke="rgba(217,160,58,0.26)" stroke-width="0.6"
              stroke-dasharray="335" stroke-dashoffset="335"/>
      </svg>

      <!-- ───────────────────────────────────────────────────────────────
           AMBIENT INGREDIENTS — float in after RELISH reveal (t≈3.8s+)
           8 spice/ingredient SVG silhouettes drifting through the scene.
           All positioned in the lower 60% of the frame to not obscure RELISH.
      ─────────────────────────────────────────────────────────────────── -->

      <!-- 1. Star Anise — drifts from lower-left toward mid-left -->
      <svg id="ing-anise" style="position:absolute;left:42px;top:680px;opacity:0;" width="32" height="32" viewBox="0 0 32 32">
        <g transform="translate(16,16)">
          <ellipse rx="2.8" ry="10" fill="#A07842" transform="rotate(0)"/>
          <ellipse rx="2.8" ry="10" fill="#A07842" transform="rotate(45)"/>
          <ellipse rx="2.8" ry="10" fill="#A07842" transform="rotate(90)"/>
          <ellipse rx="2.8" ry="10" fill="#A07842" transform="rotate(135)"/>
          <circle r="4.5" fill="#6B4A20"/>
          <circle r="2" fill="#8A6030"/>
        </g>
      </svg>

      <!-- 2. Red Chili — bottom right area -->
      <svg id="ing-chili" style="position:absolute;left:284px;top:710px;opacity:0;" width="38" height="12" viewBox="0 0 38 12">
        <path d="M5,6 Q3,4 1,2" stroke="#5A9A38" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M5,3 Q8,0 18,1 Q28,1 36,5 Q32,10 18,11 Q8,12 5,9 Q4,7 5,3 Z" fill="#C42020"/>
        <path d="M5,6 Q10,5 18,5.5 Q26,6 34,6" stroke="#8B1515" stroke-width="0.8" fill="none"/>
        <ellipse cx="34" cy="5.5" rx="2.5" ry="3" fill="#A81818"/>
      </svg>

      <!-- 3. Oil Bottle — right side -->
      <svg id="ing-bottle" style="position:absolute;left:318px;top:560px;opacity:0;" width="16" height="42" viewBox="0 0 16 42">
        <rect x="5" y="0" width="6" height="4" rx="1.5" fill="#4A5A18"/>
        <rect x="4" y="4" width="8" height="3" rx="1" fill="#6A7A28"/>
        <path d="M3,7 L13,7 L14,38 L2,38 Z" fill="#8AA030" opacity="0.92"/>
        <rect x="2" y="36" width="12" height="5" rx="2.5" fill="#6A8020"/>
        <rect x="5" y="10" width="6" height="22" rx="1.5" fill="rgba(255,255,200,0.18)"/>
        <line x1="6" y1="14" x2="10" y2="14" stroke="rgba(255,255,200,0.25)" stroke-width="0.8"/>
        <line x1="5.5" y1="20" x2="10.5" y2="20" stroke="rgba(255,255,200,0.20)" stroke-width="0.6"/>
      </svg>

      <!-- 4. Bay Leaf — left side -->
      <svg id="ing-bay" style="position:absolute;left:22px;top:520px;opacity:0;" width="38" height="16" viewBox="0 0 38 16">
        <path d="M2,8 Q8,1 22,2 Q32,3 36,8 Q32,13 22,14 Q8,15 2,8 Z" fill="#527830"/>
        <path d="M2,8 L36,8" stroke="#3E6020" stroke-width="0.9" fill="none"/>
        <path d="M14,2.5 Q13,8 14,13.5" stroke="#3E6020" stroke-width="0.6" fill="none"/>
        <path d="M24,2 Q23,8 24,14" stroke="#3E6020" stroke-width="0.6" fill="none"/>
        <path d="M8,4 Q7,8 8,12" stroke="#4A7028" stroke-width="0.5" fill="none"/>
        <path d="M30,4 Q29,8 30,12" stroke="#4A7028" stroke-width="0.5" fill="none"/>
      </svg>

      <!-- 5. Garlic Clove — bottom center-right -->
      <svg id="ing-garlic" style="position:absolute;left:196px;top:740px;opacity:0;" width="18" height="24" viewBox="0 0 18 24">
        <path d="M9,2 C14,3 16,8 16,13 C16,19 13,22 9,23 C5,22 2,19 2,13 C2,8 4,3 9,2 Z" fill="#F0E8D6"/>
        <path d="M9,3 L9,22" stroke="#C8B080" stroke-width="0.9"/>
        <path d="M5,6 Q9,3.5 13,6" stroke="#C8B080" stroke-width="0.7" fill="none"/>
        <path d="M4,10 Q9,7.5 14,10" stroke="#C8B080" stroke-width="0.6" fill="none"/>
        <path d="M3,14 Q9,11.5 15,14" stroke="#C8B080" stroke-width="0.5" fill="none"/>
      </svg>

      <!-- 6. Cardamom Pod — small, lower center-left -->
      <svg id="ing-cardamom" style="position:absolute;left:78px;top:760px;opacity:0;" width="12" height="22" viewBox="0 0 12 22">
        <ellipse cx="6" cy="11" rx="5" ry="10" fill="#4A8038"/>
        <line x1="6" y1="2" x2="6" y2="20" stroke="#3A6828" stroke-width="0.9"/>
        <line x1="1.5" y1="7" x2="10.5" y2="7" stroke="#3A6828" stroke-width="0.55"/>
        <line x1="1.5" y1="11" x2="10.5" y2="11" stroke="#3A6828" stroke-width="0.55"/>
        <line x1="1.5" y1="15" x2="10.5" y2="15" stroke="#3A6828" stroke-width="0.55"/>
        <ellipse cx="6" cy="11" rx="5" ry="10" fill="none" stroke="#3A6828" stroke-width="0.8"/>
      </svg>

      <!-- 7. Cinnamon Stick — bottom right of center -->
      <svg id="ing-cinnamon" style="position:absolute;left:248px;top:650px;opacity:0;" width="10" height="36" viewBox="0 0 10 36">
        <rect x="1" y="1" width="8" height="34" rx="3" fill="#8A4E2A"/>
        <path d="M4,3 Q5,18 4,33" stroke="#A86840" stroke-width="0.9" fill="none"/>
        <path d="M2.5,7 Q3.5,11 2.5,17" stroke="#9A5C35" stroke-width="0.7" fill="none"/>
        <path d="M6.5,9 Q7.5,14 6.5,20" stroke="#9A5C35" stroke-width="0.7" fill="none"/>
        <path d="M2.5,22 Q3.5,26 2.5,31" stroke="#9A5C35" stroke-width="0.6" fill="none"/>
      </svg>

      <!-- 8. Peppercorn Trio — mid-bottom -->
      <svg id="ing-pepper" style="position:absolute;left:138px;top:700px;opacity:0;" width="26" height="12" viewBox="0 0 26 12">
        <circle cx="5.5"  cy="6" r="5" fill="#221408"/>
        <circle cx="13"   cy="6" r="5" fill="#221408"/>
        <circle cx="20.5" cy="6" r="5" fill="#221408"/>
        <circle cx="4"    cy="4" r="1.8" fill="rgba(255,255,255,0.10)"/>
        <circle cx="11.5" cy="4" r="1.8" fill="rgba(255,255,255,0.10)"/>
        <circle cx="19"   cy="4" r="1.8" fill="rgba(255,255,255,0.10)"/>
      </svg>

      <!-- Corner registration marks -->
      <svg style="position:absolute;top:3%;left:3%;opacity:0.26;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M0 16L0 0L16 0" stroke="rgba(217,160,58,0.5)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg style="position:absolute;top:3%;right:3%;opacity:0.26;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M16 16L16 0L0 0" stroke="rgba(217,160,58,0.5)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg style="position:absolute;bottom:3%;left:3%;opacity:0.26;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M0 0L0 16L16 16" stroke="rgba(217,160,58,0.5)" stroke-width="0.9" fill="none"/>
      </svg>
      <svg style="position:absolute;bottom:3%;right:3%;opacity:0.26;" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M16 0L16 16L0 16" stroke="rgba(217,160,58,0.5)" stroke-width="0.9" fill="none"/>
      </svg>

      <!-- Film grain -->
      <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.010) 3px,rgba(0,0,0,0.010) 6px);"></div>

    </div><!-- /scene3 -->

    <!-- Loop fade-to-dark -->
    <div id="fade-overlay"></div>

  </div><!-- /root -->

  <script>
    window.__timelines = window.__timelines || {};

    var tl = gsap.timeline({
      paused: true,
      onComplete: function () { tl.restart(); }
    });

    // ══════════════════════════════════════════════════════════════════
    //  LOOP RESETS at t=0
    // ══════════════════════════════════════════════════════════════════

    tl.set('#scene1', { opacity: 1, filter: 'blur(0px)', scale: 1 }, 0);
    tl.set('#scene2', { opacity: 0, filter: 'blur(0px)' }, 0);
    tl.set('#scene3', { opacity: 0 }, 0);
    tl.set('#fade-overlay', { opacity: 0 }, 0);

    // Scene 1
    tl.set(['#s1-ghost-r','#s1-bokeh-a','#s1-bokeh-b','#s1-bokeh-c','#s1-band','#s1-rule',
            '#s1-p1','#s1-p2','#s1-p3','#s1-p4','#s1-p5','#s1-p6',
            '#s1-top-cap','#s1-label','#s1-c-tl','#s1-c-tr','#s1-c-bl','#s1-c-br'], { opacity: 0 }, 0);
    tl.set('#s1-rule', { scaleX: 0, transformOrigin: 'center' }, 0);
    tl.set('#s1-band', { scaleX: 0, transformOrigin: 'center' }, 0);
    tl.set(['#s1-p1','#s1-p2','#s1-p3','#s1-p4','#s1-p5','#s1-p6'], { x: 0, y: 0 }, 0);

    // Scene 2
    tl.set(['#s2-bokeh-a','#s2-bokeh-b','#s2-bokeh-c','#s2-steam','#s2-caption'], { opacity: 0 }, 0);
    tl.set('#s2-plate', { scale: 0.28, opacity: 0 }, 0);
    tl.set(['#s2-protein','#s2-herb','#s2-greens'], { opacity: 0 }, 0);
    tl.set('#s2-protein', { y: -14 }, 0);
    tl.set('#s2-herb', { scale: 0, transformOrigin: '50% 100%' }, 0);
    tl.set('#s2-greens', { y: 7 }, 0);
    tl.set(['#s2-d1','#s2-d2','#s2-d3','#s2-d4','#s2-d5','#s2-d6'], { attr: { opacity: 0 } }, 0);
    tl.set('#s2-sauce', { attr: { 'stroke-dashoffset': 138, 'stroke-dasharray': 138 } }, 0);
    tl.set('#s2-caption', { y: 14 }, 0);

    // Scene 3 text/rules
    tl.set(['#s3-underlight','#s3-top-rule','#s3-underline','#s3-subtitle',
            '#s3-orn-l','#s3-orn-r','#s3-bot-rule'], { opacity: 0 }, 0);
    tl.set(['#s3-l0','#s3-l1','#s3-l2','#s3-l3','#s3-l4','#s3-l5'],
           { opacity: 0, rotateX: -52, y: 18 }, 0);
    tl.set('#s3-tr-line,#s3-br-line', { attr: { 'stroke-dashoffset': 335 } }, 0);
    tl.set('#s3-ul-line', { attr: { 'stroke-dashoffset': 240 } }, 0);

    // Scene 3 ingredients — reset to initial off-screen positions
    tl.set('#ing-anise',    { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-chili',    { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-bottle',   { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-bay',      { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-garlic',   { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-cardamom', { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-cinnamon', { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);
    tl.set('#ing-pepper',   { x: 0, y: 0, rotation: 0, opacity: 0 }, 0);


    // ══════════════════════════════════════════════════════════════════
    //  SCENE 1 ENTRANCES  0.0 → 1.25
    // ══════════════════════════════════════════════════════════════════

    tl.to('#s1-ghost-r',  { opacity: 1, scale: 1, duration: 1.30, ease: 'power1.out' }, 0.04);
    tl.to('#s1-bokeh-a',  { opacity: 1, scale: 1, duration: 1.05, ease: 'power3.out' }, 0.06);
    tl.to('#s1-bokeh-b',  { opacity: 1, scale: 1, duration: 0.95, ease: 'power2.out' }, 0.14);
    tl.to('#s1-bokeh-c',  { opacity: 1, duration: 0.80, ease: 'power2.out'            }, 0.22);
    tl.to('#s1-band',     { opacity: 1, scaleX: 1, duration: 0.72, ease: 'expo.out'   }, 0.20);
    tl.to('#s1-rule',     { opacity: 1, scaleX: 1, duration: 0.82, ease: 'expo.inOut' }, 0.28);

    tl.to('#s1-p1', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.10);
    tl.to('#s1-p2', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.18);
    tl.to('#s1-p3', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.13);
    tl.to('#s1-p4', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.22);
    tl.to('#s1-p5', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.15);
    tl.to('#s1-p6', { opacity: 1, duration: 0.18, ease: 'power2.out' }, 0.21);

    tl.to('#s1-p1', { x:  8, y: -14, opacity: 0, duration: 0.96, ease: 'circ.in'   }, 0.14);
    tl.to('#s1-p2', { x: -9, y: -11, opacity: 0, duration: 0.86, ease: 'power1.in' }, 0.22);
    tl.to('#s1-p3', { x:  6, y: -16, opacity: 0, duration: 0.90, ease: 'power2.in' }, 0.16);
    tl.to('#s1-p4', { x: -6, y:  -9, opacity: 0, duration: 0.80, ease: 'circ.in'   }, 0.26);
    tl.to('#s1-p5', { x:  9, y: -15, opacity: 0, duration: 0.88, ease: 'power1.in' }, 0.18);
    tl.to('#s1-p6', { x: -5, y: -11, opacity: 0, duration: 0.84, ease: 'power2.in' }, 0.24);

    tl.to('#s1-top-cap', { opacity: 1, duration: 0.52, ease: 'power2.out' }, 0.33);
    tl.to('#s1-c-tl', { opacity: 1, scale: 1, duration: 0.34, ease: 'back.out(2.5)' }, 0.36);
    tl.to('#s1-c-tr', { opacity: 1, scale: 1, duration: 0.34, ease: 'back.out(2.5)' }, 0.43);
    tl.to('#s1-c-bl', { opacity: 1, scale: 1, duration: 0.34, ease: 'back.out(2.5)' }, 0.50);
    tl.to('#s1-c-br', { opacity: 1, scale: 1, duration: 0.34, ease: 'back.out(2.5)' }, 0.57);
    tl.to('#s1-label',  { opacity: 1, duration: 0.52, ease: 'power2.out'             }, 0.48);


    // ══════════════════════════════════════════════════════════════════
    //  TRANSITION S1 → S2: BLUR CROSSFADE  (T=1.25, 0.80s)
    // ══════════════════════════════════════════════════════════════════

    tl.to('#scene1', { filter: 'blur(22px)', scale: 1.04, opacity: 0, duration: 0.52, ease: 'power2.in' }, 1.25);
    tl.set('#scene2', { filter: 'blur(24px)' }, 1.54);
    tl.to('#scene2',  { opacity: 1, duration: 0.44, ease: 'power1.out'  }, 1.54);
    tl.to('#scene2',  { filter: 'blur(0px)', duration: 0.52, ease: 'power3.out' }, 1.54);


    // ══════════════════════════════════════════════════════════════════
    //  SCENE 2 ENTRANCES  1.72 → 2.95
    // ══════════════════════════════════════════════════════════════════

    tl.to('#s2-bokeh-a', { opacity: 1, duration: 0.58, ease: 'power2.out' }, 1.72);
    tl.to('#s2-bokeh-b', { opacity: 1, duration: 0.48, ease: 'power2.out' }, 1.80);
    tl.to('#s2-bokeh-c', { opacity: 1, duration: 0.55, ease: 'power2.out' }, 1.86);

    tl.to('#s2-plate', { scale: 1, opacity: 1, duration: 0.78, ease: 'elastic.out(1, 0.65)' }, 1.76);
    tl.to('#s2-sauce', { attr: { 'stroke-dashoffset': 0 }, duration: 0.46, ease: 'power2.inOut' }, 1.92);
    tl.to('#s2-protein', { y: 0, opacity: 1, duration: 0.38, ease: 'power3.out' }, 2.04);
    tl.to('#s2-herb',    { scale: 1, opacity: 1, duration: 0.30, ease: 'back.out(3)' }, 2.15);
    tl.to('#s2-greens',  { y: 0, opacity: 1, duration: 0.28, ease: 'power2.out'      }, 2.22);
    tl.to('#s2-steam',   { opacity: 1, duration: 0.42, ease: 'power1.out'            }, 2.08);

    tl.to('#s2-d1', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.30);
    tl.to('#s2-d2', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.36);
    tl.to('#s2-d3', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.42);
    tl.to('#s2-d4', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.46);
    tl.to('#s2-d5', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.51);
    tl.to('#s2-d6', { attr: { opacity: 1 }, duration: 0.22, ease: 'back.out(4)' }, 2.56);

    tl.to('#s2-caption', { opacity: 1, y: 0, duration: 0.38, ease: 'power3.out' }, 2.48);


    // ══════════════════════════════════════════════════════════════════
    //  TRANSITION S2 → S3: FOCUS PULL  (T=2.95, 0.55s)
    // ══════════════════════════════════════════════════════════════════

    tl.to('#scene2', { filter: 'blur(18px)', opacity: 0, duration: 0.52, ease: 'power2.in' }, 2.95);
    tl.to('#scene3', { opacity: 1, duration: 0.40, ease: 'power1.out'                       }, 3.08);


    // ══════════════════════════════════════════════════════════════════
    //  SCENE 3 ENTRANCES  3.28 → 4.2 (RELISH reveal)
    // ══════════════════════════════════════════════════════════════════

    tl.to('#s3-underlight', { opacity: 1, duration: 0.70, ease: 'power2.out' }, 3.28);

    tl.to('#s3-top-rule', { opacity: 1, duration: 0.10 }, 3.30);
    tl.to('#s3-tr-line', { attr: { 'stroke-dashoffset': 0 }, duration: 0.58, ease: 'expo.out' }, 3.30);

    // Letters tumble in — stagger 0.09s apart, power3.out
    var lDelay = 3.40;
    ['#s3-l0','#s3-l1','#s3-l2','#s3-l3','#s3-l4','#s3-l5'].forEach(function(id, i) {
      tl.to(id, { opacity: 1, rotateX: 0, y: 0, duration: 0.38, ease: 'power3.out' }, lDelay + i * 0.09);
    });
    // Last letter lands at: 3.40 + 5×0.09 + 0.38 = 4.23s

    tl.to('#s3-underline', { opacity: 1, duration: 0.10 }, 4.05);
    tl.to('#s3-ul-line', { attr: { 'stroke-dashoffset': 0 }, duration: 0.40, ease: 'expo.out' }, 4.05);
    tl.to('#s3-subtitle', { opacity: 1, duration: 0.32, ease: 'power2.out' }, 4.10);
    tl.to('#s3-orn-l',    { opacity: 1, duration: 0.22, ease: 'back.out(3)' }, 4.16);
    tl.to('#s3-orn-r',    { opacity: 1, duration: 0.22, ease: 'back.out(3)' }, 4.20);
    tl.to('#s3-bot-rule', { opacity: 1, duration: 0.10 }, 4.18);
    tl.to('#s3-br-line',  { attr: { 'stroke-dashoffset': 0 }, duration: 0.44, ease: 'expo.out' }, 4.18);


    // ══════════════════════════════════════════════════════════════════
    //  AMBIENT INGREDIENTS FLOAT IN  (4.35 → 7.0)
    //  8 spices/ingredients drift through the dark canvas.
    //  Each enters from its position, drifts upward, sways gently.
    //  repeat counts calculated so motion covers the 7.5s total duration.
    // ══════════════════════════════════════════════════════════════════

    // ─ Star Anise — lower-left, drifts up-right, slow rotation ─────
    tl.to('#ing-anise', { opacity: 0.20, duration: 0.45, ease: 'power2.out' }, 4.35);
    tl.to('#ing-anise', {
      y: -130, x: 18, rotation: 48,
      duration: 3.0, ease: 'power1.inOut',
      repeat: 0
    }, 4.35);
    // Gentle x sway on top
    tl.to('#ing-anise', { x: '+=22', duration: 1.4, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 4.80);

    // ─ Red Chili — lower-right, drifts left-upward ─────────────────
    tl.to('#ing-chili', { opacity: 0.22, duration: 0.40, ease: 'power2.out' }, 4.60);
    tl.to('#ing-chili', {
      y: -160, x: -24, rotation: -22,
      duration: 3.2, ease: 'none',
      repeat: 0
    }, 4.60);

    // ─ Oil Bottle — right side, drifts left-up with sway ───────────
    tl.to('#ing-bottle', { opacity: 0.18, duration: 0.50, ease: 'power1.out' }, 4.80);
    tl.to('#ing-bottle', {
      y: -180, x: -12, rotation: 8,
      duration: 2.8, ease: 'sine.inOut',
      repeat: 0
    }, 4.80);

    // ─ Bay Leaf — left side, drifts right-upward ───────────────────
    tl.to('#ing-bay', { opacity: 0.19, duration: 0.42, ease: 'power2.out' }, 4.50);
    tl.to('#ing-bay', {
      y: -140, x: 30, rotation: 35,
      duration: 3.4, ease: 'power1.inOut',
      repeat: 0
    }, 4.50);

    // ─ Garlic Clove — bottom center-right, drifts upward ───────────
    tl.to('#ing-garlic', { opacity: 0.21, duration: 0.38, ease: 'power2.out' }, 4.70);
    tl.to('#ing-garlic', {
      y: -170, x: -14, rotation: -18,
      duration: 2.9, ease: 'sine.inOut',
      repeat: 0
    }, 4.70);

    // ─ Cardamom Pod — small, floats up from lower-left ─────────────
    tl.to('#ing-cardamom', { opacity: 0.22, duration: 0.36, ease: 'power2.out' }, 4.45);
    tl.to('#ing-cardamom', {
      y: -200, x: 16, rotation: 60,
      duration: 2.7, ease: 'power1.inOut',
      repeat: 0
    }, 4.45);

    // ─ Cinnamon Stick — lower center-right, drifts up-left ─────────
    tl.to('#ing-cinnamon', { opacity: 0.18, duration: 0.44, ease: 'power1.out' }, 4.90);
    tl.to('#ing-cinnamon', {
      y: -155, x: -8, rotation: -35,
      duration: 3.1, ease: 'none',
      repeat: 0
    }, 4.90);

    // ─ Peppercorn Trio — center-bottom, drifts upward ──────────────
    tl.to('#ing-pepper', { opacity: 0.20, duration: 0.38, ease: 'power2.out' }, 4.55);
    tl.to('#ing-pepper', {
      y: -150, x: 10, rotation: 12,
      duration: 3.0, ease: 'power1.inOut',
      repeat: 0
    }, 4.55);

    // ─ Second wave: ingredients fade back out as loop ends ──────────
    tl.to(['#ing-anise','#ing-chili','#ing-bottle','#ing-bay',
            '#ing-garlic','#ing-cardamom','#ing-cinnamon','#ing-pepper'],
      { opacity: 0, duration: 0.50, ease: 'power2.in' }, 6.80);


    // ══════════════════════════════════════════════════════════════════
    //  FADE TO DARK — LOOP END  6.90 → 7.50
    // ══════════════════════════════════════════════════════════════════

    tl.to('#fade-overlay', { opacity: 0.96, duration: 0.60, ease: 'power2.inOut' }, 6.90);


    // ══════════════════════════════════════════════════════════════════
    //  REGISTER + AUTO-PLAY
    // ══════════════════════════════════════════════════════════════════

    window.__timelines['relish-hero'] = tl;

    if (typeof window.__hyperframes === 'undefined') {
      tl.play();
    }
  </script>
</body>
</html>
